<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stunt Ideas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a1130;
    --bg-2:#0e1b4d;
    --line:rgba(255,255,255,.08);
    --ink:#eff0f5;
    --muted:#9aa4cc;
    --accent:#4770db;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(71,112,219,.18), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:'Sora',system-ui,sans-serif;
    min-height:100vh;
    padding:clamp(28px,5vw,72px) clamp(18px,4vw,56px) 96px;
  }
  .wrap{max-width:1180px;margin:0 auto}

  header{margin-bottom:clamp(36px,5vw,64px)}
  .eyebrow{
    font-size:12px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;
    color:var(--accent);
  }
  h1{
    font-size:clamp(34px,6vw,68px);font-weight:800;letter-spacing:-.03em;
    line-height:1.02;margin-top:14px;
  }

  .section-label{
    font-size:12px;font-weight:600;letter-spacing:.24em;text-transform:uppercase;
    color:var(--muted);
    margin:clamp(40px,6vw,72px) 0 22px;
    display:flex;align-items:center;gap:16px;
  }
  .section-label::after{content:"";flex:1;height:1px;background:var(--line)}
  .section-label:first-of-type{margin-top:0}

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:clamp(20px,2.4vw,34px);
    justify-items:center;
  }

  .card{width:100%;max-width:360px}

  .tag{
    display:flex;align-items:baseline;gap:10px;
    margin-bottom:12px;
  }
  .tag .price{
    font-size:22px;font-weight:800;letter-spacing:-.02em;color:var(--ink);
  }
  .tag .name{
    font-size:13px;font-weight:400;letter-spacing:.02em;color:var(--muted);
  }

  /* Instagram embed sits in its own card frame */
  .igframe{
    border-radius:16px;overflow:hidden;
    background:var(--bg-2);
    border:1px solid var(--line);
    box-shadow:0 24px 60px -28px rgba(0,0,0,.7);
  }
  .instagram-media{margin:0 !important;min-width:0 !important;border-radius:0 !important;border:0 !important;box-shadow:none !important}
  video.native{display:block;width:100%;aspect-ratio:9/16;background:#000;object-fit:cover}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Stunt Ideas</div>
    <h1>What we could build next.</h1>
  </header>

  <div class="section-label">Balloon stunts</div>
  <div class="grid">
    <div class="card">
      <div class="tag"><span class="price">$15K</span><span class="name">Boxing ring</span></div>
      <div class="igframe"><blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/reel/DVME8RTjoaJ/" data-instgrm-version="14"></blockquote></div>
    </div>
    <div class="card">
      <div class="tag"><span class="price">$20K</span><span class="name">Slide</span></div>
      <div class="igframe"><blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/reel/DTvd54mjxBt/" data-instgrm-version="14"></blockquote></div>
    </div>
    <div class="card">
      <div class="tag"><span class="price">$50K</span><span class="name">Soccer field</span></div>
      <div class="igframe"><video class="native" controls playsinline preload="metadata" poster="soccer-field-poster.jpg"><source src="soccer-field.mp4" type="video/mp4"></video></div>
    </div>
  </div>

  <div class="section-label">Other ideas</div>
  <div class="grid">
    <div class="card"><div class="igframe"><blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/reel/C8pXcAnSPYl/" data-instgrm-version="14"></blockquote></div></div>
    <div class="card"><div class="igframe"><blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/reel/DYXaIRSxeq0/" data-instgrm-version="14"></blockquote></div></div>
    <div class="card"><div class="igframe"><blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/reel/DTNmUoIAOCg/" data-instgrm-version="14"></blockquote></div></div>
    <div class="card"><div class="igframe"><blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/reel/DS7JjTKj75f/" data-instgrm-version="14"></blockquote></div></div>
    <div class="card"><div class="igframe"><blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/reel/DZx3DhHvoJj/" data-instgrm-version="14"></blockquote></div></div>
    <div class="card"><div class="igframe"><blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/reel/DZm4PJuOPvs/" data-instgrm-version="14"></blockquote></div></div>
  </div>
</div>
<script async src="//www.instagram.com/embed.js"></script>
</body>
</html>
